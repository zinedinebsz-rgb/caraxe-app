<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merci — CARAXES</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #141210;
            color: #e8e0d4;
            font-family: system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        .logo {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            color: #c8a85c;
            font-family: Georgia, serif;
            text-transform: uppercase;
            margin-bottom: 3rem;
        }
        .logo span { color: #c0392b; }
        .check-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #c0392b 0%, #c8a85c 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            animation: scaleIn 0.5s ease-out;
        }
        .check-icon svg { width: 40px; height: 40px; fill: none; stroke: white; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
        @keyframes scaleIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        h1 {
            font-family: Georgia, serif;
            font-size: 2.5rem;
            color: #c8a85c;
            margin-bottom: 1rem;
        }
        p {
            font-size: 1.1rem;
            color: #a09888;
            max-width: 500px;
            line-height: 1.8;
            margin-bottom: 1rem;
        }
        .highlight {
            color: #e8e0d4;
            font-weight: 600;
        }
        .info-box {
            background: #1e1a16;
            border: 1px solid #2a2520;
            border-left: 3px solid #c8a85c;
            padding: 1.5rem 2rem;
            margin: 2rem 0;
            text-align: left;
            max-width: 500px;
        }
        .info-box p { margin-bottom: 0.5rem; font-size: 0.95rem; }
        .back-link {
            display: inline-block;
            margin-top: 2rem;
            color: #c8a85c;
            text-decoration: none;
            font-size: 0.95rem;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s;
        }
        .back-link:hover { border-bottom-color: #c8a85c; }
        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #c8a85c;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 0.5rem;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="logo">CARAXE<span>S</span></div>

    <div class="check-icon">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
    </div>

    <h1>Merci pour votre confiance</h1>

    <p>Votre paiement a bien ete recu. <span class="highlight">Notre equipe se met au travail immediatement.</span></p>

    <div class="info-box">
        <p><span class="spinner"></span> <span class="highlight">En cours de traitement...</span></p>
        <p>Vous recevrez un email de confirmation dans les prochaines minutes a l'adresse fournie.</p>
        <p>Pour toute question : <span class="highlight">contact@caraxes.fr</span></p>
    </div>

    <a href="https://caraxes.fr" class="back-link">Retour au site CARAXES</a>
</body>
</html>
